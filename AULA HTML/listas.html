<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas HTML</title>
</head>
<body>
    <!-- Listas não Ordenada -->
     <h1>Lista de compras</h1>
     <h2>Itens para macarronada</h2>
     <ul>
        <li>Macarrão</li>
        <li>Molho</li>
        <li>Carne moida</li>
        <li>Queijo</li>
        <li>Coca-Cola</li>
     </ul>

     <!-- Lista Ordenada -->
      <ol type="1">
        <li>Macarrão</li>
        <li>Molho</li>
        <li>Carne moida</li>
        <li>Queijo</li>
        <li>Coca-Cola</li>
      </ol>
</body>
</html>
