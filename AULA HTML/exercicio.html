<!DOCTYPE html>
<html lang="pr-BT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXERCICIO</title>
</head>
<body>
    <h1>Cadastro >> Incluir</h1>
    <form action="exercicio">
        <label for="nome">Nome Completo *</label> <br>
        <input type="text" id="nome" >

        <label for="sexo">Sexo</label>
        <select name="sexo" id="sexo" >
            <option value="">Selecione</option>
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
        </select>
        <br>
        <br>
        <label for="cpf">CPF*</label>
        <label for="rg">RG</label>
        <label for="nascimento">Nascimento</label>
        <br>
        <input type="text" id="cpf">
        <input type="text" id="rg">
        <input type="date" id="nascimento" >
        <br>
        <br>
        <label for="ddTel">DDD*</label>
        <label for="tel">Telefone*</label>
        <label for="ddCel">DDD</label>
        <label for="cel">Celular</label>
        <br>
        <input type="text" maxlength="2" id="ddTel">
        <input type="text" maxlength="9" id="tel">
        <input type="text" maxlength="2" id="ddCel">
        <input type="text" maxlength="9" id="cel">
        <br>
        <br>
        <label for="email">Email*</label>
        <label for="senha">Senha</label>
        <label for="confSenha">Confirme</label>
        <br>
        <input type="text" id="email">
        <input type="text" id="senha">
        <input type="text" id="confSenha">
        <br>
        <br>
        <label for="cep">CEP*</label>
        <label for="endereco">Endereço</label>
        <label for="numero">Número</label>
        <br>
        <input type="text" id="cep">
        <input type="text" id="endereco">
        <input type="text" id="numero">
        <br>
        <br>
        <label for="bairro">Bairro*</label>
        <label for="complemento">Complemento</label>
        <label for="cidade">Cidade</label>
        <label for="estado"></label>
        <br>
        <input type="text" id="bairro">
        <input type="text" id="complemento">
        <input type="text" id="cidade">
        <select name="estado" id="estado">
            <option value="">Selecione</option>
            <option value="AC">Acre</option>
            <option value="SP">São Paulo</option>
            <option value="RJ">Rio Janeiro</option>
            <option value="MG">Minas Gerais</option>
        </select>
        <br>
        <br>
        <button >Salvar</button>

    </form>
</body>
<script>
    const hoje = new Date().toISOString().split("T")[0];
    document.getEementById("data").value = hoje
</script>
</html>
