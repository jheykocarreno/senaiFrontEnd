<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens em HTML</title>
</head>

<body>
    <!-- img 
    src: Endereço da imagem
    title: Titulo caso não consiga carregar a imagem
    alt: Texto alternativo para descrição
    width: largura da imagem
    height: altura da imagem
    -->
    <img src="https://i.redd.it/lx150cf7hhbf1.jpeg"
        alt="Alt One Piece" title="Titulo One Piece" width="300px" height="300px"
    />

</body>

</html>
