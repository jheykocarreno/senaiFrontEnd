<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS na pratica</title>
    <style>
        h2 {
            color: green;
        }
        .destaque {
            color: orange;
        }
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Testando Prioridade de CSS</h1>

    <h2 style="color:red">Inline (vermelho)</h2>

    <h2>Interno (verde)</h2>

    <h2 class="externo">Externo (roxo)</h2>

    <!--Conflito-->
    <h2 class="destaque" style="color: red;">Quem ganha (inline vs clase vs externo)</h2>
</body>
</html>
