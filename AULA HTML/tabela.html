<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABELAS</title>
</head>
<body>
    <!--
    <table></table>     define a tabela
    <caption>           legenda da tabela
    <tr></tr>           adiciona linha na tabela
    <th></th>           adiciona uma célula de cabeçalho, texto negrito
    <td></td>           adiciona uma célula de dado comun, alinha a esqueda

    <thead></thead>     cabeçalho da tabela
    <tbody></tbody>     corpo da tabela
    <tfoot></tfoot>     rodapé da tabela
    -->

    <h1>TABELA</h1>
    <table>
        <caption>Cadastro de clientes</caption>
        <thead>
            <tr>
                <th>Nome</th>
                <th>e-Mail</th>
                <th>Celular</th>
                <th>Cargo</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Pedro</td>
                <td>pedro1611@email.com</td>
                <td>(11)987654321</td>
                <td>Engenheiro</td>
            </tr>
            <tr>
                <td>Anthony</td>
                <td>tony1611@email.com</td>
                <td>(11)912345678</td>
                <td>Medico</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3"></td>
                <td>Total 3</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
