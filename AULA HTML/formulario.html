<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO</title>
</head>
<body>
    <form action="receber-dados.html" method="POST">
        <label for="nome">Nome</label> <br>
        <input type="text" id="nome">

        <label for="email">e-Mail</label>
        <input type="text" id="email">
        <br>
        <input type="radio" name="sexo" value="masculino"> Masculino
        <input type="radio" name="sexo" value="feminino"> Feminino
        <br>
        <input type="checkbox" name="hobbies[]"> Ouvir musica
        <input type="checkbox" name="hobbies[]"> Jogar videogame
        <input type="checkbox" name="hobbies[]"> Futebol
        <br>
        <select name="estado" id="estado">
            <option value="">Selecione</option>
            <option value="AM">Amazonas</option>
            <option value="SP">São Paulo</option>
            <option value="RJ">Rio Janeiro</option>
        </select>   
        <br>
        <fieldset>
            <legend>Dados pessoais</legend>
            <label for="nome">Nome</label>
            <input type="text" id="nome">
            <label for="email">Email</label>
            <input type="text" id="email">
            <br>
            <label for="fone">Telefone</label>
            <input type="text" id="fone">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco">
        </fieldset>
        <br>
        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" min="1" max="120" step="1" value="18">
        <br>
        <label for="points">Pontuação</label>
        <input type="range" id="points" name="points" min="0" max="20">
        <br>
        <input type="text" placeholder="Digite seu nome">
        <input type="text" placeholder="Digite seu email" required>
        <input type="text" placeholder="Seu sobrenome" autofocus>
        <input type="text" placeholder="Não editavel" disabled>

        <label for="data">Data:</label>
        <input type="date" id="data" name="data" min="1900-01-01" max="2020-12-31">
    </form> 
</body>
</html>
